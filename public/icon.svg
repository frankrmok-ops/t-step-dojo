<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="40" fill="#000000"/>
  
  <!-- Left Katana -->
  <g transform="rotate(-45, 100, 100)">
    <rect x="95" y="20" width="10" height="120" fill="#C0C0C0"/>
    <rect x="95" y="20" width="10" height="120" fill="url(#blade-gradient)"/>
    <rect x="95" y="20" width="2" height="120" fill="#E8E8E8"/>
    <polygon points="95,20 100,5 105,20" fill="#C0C0C0"/>
    <ellipse cx="100" cy="145" rx="15" ry="6" fill="#1a1a1a" stroke="#DC143C" stroke-width="2"/>
    <rect x="93" y="150" width="14" height="40" fill="#1a1a1a"/>
    <g stroke="#DC143C" stroke-width="2">
      <line x1="93" y1="155" x2="107" y2="155"/>
      <line x1="93" y1="165" x2="107" y2="165"/>
      <line x1="93" y1="175" x2="107" y2="175"/>
      <line x1="93" y1="185" x2="107" y2="185"/>
    </g>
    <ellipse cx="100" cy="192" rx="8" ry="4" fill="#DC143C"/>
  </g>

  <!-- Right Katana -->
  <g transform="rotate(45, 100, 100)">
    <rect x="95" y="20" width="10" height="120" fill="#C0C0C0"/>
    <rect x="95" y="20" width="10" height="120" fill="url(#blade-gradient)"/>
    <rect x="103" y="20" width="2" height="120" fill="#E8E8E8"/>
    <polygon points="95,20 100,5 105,20" fill="#C0C0C0"/>
    <ellipse cx="100" cy="145" rx="15" ry="6" fill="#1a1a1a" stroke="#DC143C" stroke-width="2"/>
    <rect x="93" y="150" width="14" height="40" fill="#1a1a1a"/>
    <g stroke="#DC143C" stroke-width="2">
      <line x1="93" y1="155" x2="107" y2="155"/>
      <line x1="93" y1="165" x2="107" y2="165"/>
      <line x1="93" y1="175" x2="107" y2="175"/>
      <line x1="93" y1="185" x2="107" y2="185"/>
    </g>
    <ellipse cx="100" cy="192" rx="8" ry="4" fill="#DC143C"/>
  </g>

  <defs>
    <linearGradient id="blade-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A0A0A0"/>
      <stop offset="50%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>
  </defs>
</svg>